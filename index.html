<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PLUME VUE CARD NEWS 생성기</title>

<style>

body{
    margin:0;
    background:#f5ece1;
    font-family:sans-serif;
}

.container{
    width:700px;
    margin:auto;
    padding:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

input, select{
    width:100%;
    padding:15px;
    margin-bottom:20px;
    border:none;
    border-radius:15px;
    background:#f3f3f3;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#d9b99b;
    color:white;
    font-size:18px;
    cursor:pointer;
}

img{
    width:100%;
    border-radius:20px;
    margin-top:30px;
}

.download{
    display:block;
    margin-top:30px;
    text-align:center;
    background:black;
    color:white;
    padding:15px;
    border-radius:15px;
    text-decoration:none;
}

.hashtags{
    margin-top:30px;
    background:#f3f3f3;
    padding:20px;
    border-radius:20px;
    white-space:pre-line;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>PLUME VUE CARD NEWS 생성기</h1>

<form method="POST" enctype="multipart/form-data">

<input
    type="text"
    name="topic"
    placeholder="주제를 입력하세요"
    required
>

<select name="template">

    <option value="dark">
        Dark Luxury
    </option>

    <option value="light">
        Light Minimal
    </option>

</select>

<input
    type="file"
    name="images"
    multiple
    required
>

<button type="submit">

    카드뉴스 생성하기

</button>

</form>

{% for image in generated_images %}

<img
    src="{{ url_for('static', filename=image) }}"
>

{% endfor %}

{% if generated_images %}

<a
    class="download"
    href="/download"
>

ZIP 다운로드

</a>

{% endif %}

{% if hashtags %}

<div class="hashtags">

{{ hashtags }}

</div>

{% endif %}

</div>

</div>

</body>

</html>
